# Template nginx — variáveis substituídas por envsubst no startup:
#   ${PORT}          → porta fornecida pelo Railway
#   ${BACKEND_HOST}  → hostname interno do backend (ex: backend.railway.internal)
#   ${BACKEND_PORT}  → porta do backend (ex: 8000)
#   ${NGINX_RESOLVER}→ DNS do container (extraído de /etc/resolv.conf pelo nginx-entrypoint.sh)
#
# Variáveis nginx ($uri, $host, $remote_addr, etc.) são preservadas pelo envsubst
# porque não são variáveis de ambiente.

server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Resolver dinâmico: permite reresolver backend.railway.internal em runtime
    resolver ${NGINX_RESOLVER} valid=30s;

    # Variável nginx com o upstream do backend (resolução dinâmica)
    set $api_upstream http://${BACKEND_HOST}:${BACKEND_PORT};

    # Proxy para rotas da API FastAPI: /q1 até /q8, /health, /docs, /openapi.json, /redoc
    location ~ ^/(q[1-8]|health|docs|openapi\.json|redoc) {
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    120s;
    }

    # SPA fallback: todas as outras rotas retornam o index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
